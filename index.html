<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetes Kids: Aventura en la Nube</title>
    <!-- Bibliotecas Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide-react.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Fredoka', sans-serif; 
            background: #f0f7ff; 
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            color: #1e293b;
        }

        /* Estilos 3D Pro */
        .card-3d {
            background: white;
            border-radius: 2.5rem;
            border: 4px solid #f1f5f9;
            box-shadow: 0 10px 0 0 #e2e8f0;
            transition: all 0.2s ease;
        }
        .card-3d:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 0 0 #e2e8f0;
        }

        .btn-3d {
            border-radius: 1.5rem;
            font-weight: 900;
            transition: all 0.1s ease;
            position: relative;
            top: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-3d:active {
            top: 6px;
            box-shadow: 0 2px 0 0 currentColor !important;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(2deg); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 20px; }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .emoji-option {
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.2s;
            padding: 15px;
            border-radius: 1.5rem;
            border: 4px solid transparent;
        }
        .emoji-option:hover { transform: scale(1.2); background: #f1f5f9; }
        .emoji-selected { background: #f0f9ff; border-color: #3b82f6; transform: scale(1.1); }
        
        .medal-slot {
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .medal-unlocked::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }
        @keyframes shine { 0% { left: -100%; } 100% { left: 100%; } }

        .medal-locked {
            filter: grayscale(0.8) opacity(0.7);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Exponer SDK globalmente para usarlo dentro de React
        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot, collection, query };
    </script>

    <script type="text/babel">
        (function() {
            const { useState, useMemo, useEffect } = React;

            const SafeIcon = ({ name, color, size = 24, className = "" }) => {
                const Lucide = window.lucide;
                if (!Lucide || !Lucide[name]) return null;
                const Component = Lucide[name];
                return <Component color={color} size={size} className={className} />;
            };

            const colorThemes = {
                rose: { bg: 'bg-rose-500', text: 'text-rose-500', light: 'bg-rose-50', border: 'border-rose-200', shadow: 'shadow-[0_8px_0_0_#e11d48]', gradient: 'from-pink-400 to-rose-600', chart: '#fb7185' },
                indigo: { bg: 'bg-indigo-500', text: 'text-indigo-600', light: 'bg-indigo-50', border: 'border-indigo-200', shadow: 'shadow-[0_8px_0_0_#4f46e5]', gradient: 'from-indigo-400 to-violet-600', chart: '#818cf8' },
                emerald: { bg: 'bg-emerald-500', text: 'text-emerald-600', light: 'bg-emerald-50', border: 'border-emerald-200', shadow: 'shadow-[0_8px_0_0_#059669]', gradient: 'from-emerald-400 to-teal-600', chart: '#34d399' },
                violet: { bg: 'bg-purple-500', text: 'text-purple-600', light: 'bg-purple-50', border: 'border-purple-200', shadow: 'shadow-[0_8px_0_0_#7c3aed]', gradient: 'from-purple-400 to-indigo-600', chart: '#a78bfa' },
                amber: { bg: 'bg-amber-500', text: 'text-amber-600', light: 'bg-amber-50', border: 'border-amber-200', shadow: 'shadow-[0_8px_0_0_#d97706]', gradient: 'from-amber-400 to-orange-600', chart: '#fbbf24' }
            };

            const achievementColors = ['from-yellow-400 to-orange-600', 'from-emerald-400 to-teal-600', 'from-purple-400 to-fuchsia-600', 'from-sky-400 to-indigo-600', 'from-rose-400 to-red-600', 'from-amber-300 to-yellow-500'];

            const availableEmojis = ['👧', '👦', '😎', '🤩', '🤠', '👻', '🤖', '👽', '🎨', '🍦', '🎮', '🦄', '🐱', '🐶', '🐰', '🦊', '🦋', '🦖', '🐢', '🐳', '🌸', '🌻', '🍭', '🍩', '🧁', '🍓', '🍉', '🍕', '🍔', '🍟', '⭐', '✨', '🪄', '🚀', '🛸', '🌙', '🌈', '💎', '👑', '💃', '🩰', '⚽', '🛹', '🎸', '🥁', '🧩', '🧸', '📚'];

            const PieChartSources = ({ data }) => {
                if (!data || data.length === 0) return <div className="text-center py-8 text-slate-400 italic font-bold">¡Aún no hay tesoros guardados!</div>;
                const total = data.reduce((sum, item) => sum + item.value, 0);
                let cumulativePercent = 0;
                const colors = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#8AC926'];
                return (
                    <div className="flex flex-col md:flex-row items-center justify-center gap-12 fade-in">
                        <div className="relative w-64 h-64 drop-shadow-xl flex-shrink-0">
                            <svg viewBox="0 0 32 32" className="w-full h-full transform -rotate-90">
                                {data.map((item, i) => {
                                    const percent = (item.value / total) * 100;
                                    const strokeDasharray = `${percent} ${100 - percent}`;
                                    const strokeDashoffset = -cumulativePercent;
                                    cumulativePercent += percent;
                                    return <circle key={i} cx="16" cy="16" r="16" fill="transparent" stroke={colors[i % colors.length]} strokeWidth="32" strokeDasharray={strokeDasharray} strokeDashoffset={strokeDashoffset} className="transition-all duration-700" />;
                                })}
                                <circle cx="16" cy="16" r="10" fill="white" />
                            </svg>
                            <div className="absolute inset-0 flex items-center justify-center flex-col text-center">
                                <span className="text-xs font-black text-slate-400 uppercase leading-none">Total</span>
                                <span className="text-2xl font-black text-slate-800 tracking-tighter">${total.toLocaleString()}</span>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 w-full max-h-64 overflow-y-auto custom-scrollbar pr-2">
                            {data.map((item, i) => (
                                <div key={i} className="flex items-center justify-between bg-slate-50 p-4 rounded-2xl border border-slate-100 shadow-sm">
                                    <div className="flex items-center gap-3">
                                        <div className="w-4 h-4 rounded-full" style={{ backgroundColor: colors[i % colors.length] }}></div>
                                        <span className="font-bold text-slate-700 text-sm truncate max-w-[120px]">{item.label}</span>
                                    </div>
                                    <div className="text-right">
                                        <div className="font-black text-slate-800 text-lg">${item.value.toLocaleString()}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const GrowthLineChart = ({ data, color }) => {
                if (!data || data.length < 2) return <div className="h-full flex flex-col items-center justify-center text-slate-400 font-bold italic p-8 text-center bg-white rounded-[2rem] border-4 border-dashed border-slate-100"><SafeIcon name="CloudRain" size={80} className="mb-4 opacity-20" /><p className="text-2xl">¡Agrega tu primer ahorro para dibujar la montaña!</p></div>;
                const width = 800, height = 300, padding = 60;
                const maxVal = Math.max(...data.map(d => d.balance)) * 1.2, minVal = 0;
                const points = data.map((d, i) => {
                    const x = padding + (i * (width - 2 * padding)) / (data.length - 1);
                    const y = height - padding - ((d.balance - minVal) * (height - 2 * padding)) / (maxVal - minVal);
                    return { x, y, balance: d.balance };
                });
                const pathData = `M ${points[0].x} ${points[0].y} ` + points.slice(1).map(p => `L ${p.x} ${p.y}`).join(' ');
                return (
                    <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full overflow-visible drop-shadow-2xl">
                        <defs><linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor={color} /><stop offset="100%" stopColor="#10b981" /></linearGradient></defs>
                        <rect x={padding} y={height-padding} width={width-padding*2} height="8" rx="4" fill="#f1f5f9" />
                        <path d={pathData} fill="none" stroke="url(#lineGrad)" strokeWidth="10" strokeLinecap="round" strokeLinejoin="round" />
                        {points.map((p, i) => (
                            <g key={i}><circle cx={p.x} cy={p.y} r="12" fill="white" stroke={i === points.length - 1 ? "#10b981" : color} strokeWidth="6" /><g transform={`translate(${p.x}, ${p.y - 45})`}><rect x="-35" y="-12" width="70" height="24" rx="12" fill="white" stroke="#e2e8f0" strokeWidth="2" /><text textAnchor="middle" y="5" fontSize="12" fontWeight="900" fill="#1e293b">${p.balance.toLocaleString()}</text></g></g>
                        ))}
                    </svg>
                );
            };

            const App = () => {
                const [firebaseState, setFirebaseState] = useState({ ready: false, db: null, auth: null });
                const [user, setUser] = useState(null);
                const [profiles, setProfiles] = useState([]);
                const [loading, setLoading] = useState(true);
                const [activeProfileId, setActiveProfileId] = useState(null);
                
                // Modales
                const [showAddModal, setShowAddModal] = useState(false);
                const [showGoalModal, setShowGoalModal] = useState(false);
                const [showProfileModal, setShowProfileModal] = useState(false);
                const [showAdminModal, setShowAdminModal] = useState(false);
                const [showSettingsModal, setShowSettingsModal] = useState(false);
                const [adminTab, setAdminTab] = useState('balance');

                // Inputs
                const [newAmount, setNewAmount] = useState('');
                const [newNote, setNewNote] = useState('');
                const [newGoalName, setNewGoalName] = useState('');
                const [newGoalTarget, setNewGoalTarget] = useState('');
                const [editingGoalId, setEditingGoalId] = useState(null);
                
                // Logros
                const [newAchName, setNewAchName] = useState('');
                const [newAchTarget, setNewAchTarget] = useState('');
                const [newAchType, setNewAchType] = useState('ahorro');
                const [newAchIcon, setNewAchIcon] = useState('Trophy');

                const [newName, setNewName] = useState('');
                const [newTheme, setNewTheme] = useState('rose');
                const [newEmoji, setNewEmoji] = useState('👧');
                const [adminRealBalance, setAdminRealBalance] = useState('');

                // Tu App ID real de Firestore
                const APP_ID = 'ceteskids'; 

                // 1. Inicialización Dinámica de Firebase
                useEffect(() => {
                    const checkSDK = setInterval(() => {
                        if (window.FirebaseSDK) {
                            clearInterval(checkSDK);
                            const { initializeApp, getAuth, getFirestore } = window.FirebaseSDK;
                            
                            // Tu configuración real de Firebase
                            const config = {
                                apiKey: "AIzaSyCgh9G37P75Z1L53JZzI2jjL4GBgcV74Pk",
                                authDomain: "ceteskids.firebaseapp.com",
                                projectId: "ceteskids",
                                storageBucket: "ceteskids.firebasestorage.app",
                                messagingSenderId: "819262734652",
                                appId: "1:819262734652:web:c385b1479ea83448975e39"
                            };

                            const app = initializeApp(config);
                            const auth = getAuth(app);
                            const db = getFirestore(app);
                            setFirebaseState({ ready: true, db, auth });
                        }
                    }, 50);
                    return () => clearInterval(checkSDK);
                }, []);

                // 2. Autenticación Anónima
                useEffect(() => {
                    if (!firebaseState.ready) return;
                    const { signInAnonymously, onAuthStateChanged } = window.FirebaseSDK;
                    const { auth } = firebaseState;

                    const initAuth = async () => {
                        try {
                            await signInAnonymously(auth);
                        } catch(e) {
                            console.error("Error al autenticar", e);
                        }
                    };
                    initAuth();
                    const unsubscribe = onAuthStateChanged(auth, setUser);
                    return () => unsubscribe();
                }, [firebaseState.ready, firebaseState.auth]);

                // 3. Obtener Datos
                useEffect(() => {
                    if (!user || !firebaseState.ready) return;
                    const { collection, query, onSnapshot, doc, setDoc } = window.FirebaseSDK;
                    const { db } = firebaseState;

                    // Ruta simplificada para tu propio Firebase
                    const q = query(collection(db, 'perfiles'));
                    
                    const unsubscribe = onSnapshot(q, (snapshot) => {
                        const loaded = snapshot.docs.map(d => ({ ...d.data(), id: d.id }));
                        if (loaded.length === 0) {
                            // Generar perfil semilla la primera vez
                            const defaultAchievements = [
                                { id: 'd1', label: 'Primer Ahorro', target: 500, type: 'ahorro', icon: 'PiggyBank', color: 'from-yellow-400 to-orange-600' }
                            ];
                            const demo = { id: 'demo', name: 'Majo', theme: 'rose', emoji: '🎨', realBalance: 0, totalContributed: 0, history: [], snapshots: [], goals: [], achievements: defaultAchievements, config: { iceCreamPrice: 45, moviePrice: 120 } };
                            
                            setDoc(doc(db, 'perfiles', 'demo'), demo);
                        } else {
                            setProfiles(loaded);
                            setActiveProfileId(prev => prev || loaded[0].id);
                        }
                        setLoading(false);
                    }, (error) => console.error("Error sincronizando:", error));

                    return () => unsubscribe();
                }, [user, firebaseState.ready, firebaseState.db]);

                const activeProfile = profiles.find(p => p.id === activeProfileId) || profiles[0] || {};
                const theme = colorThemes[activeProfile.theme] || colorThemes.rose;

                const saveToCloud = async (data) => {
                    if (!user || !firebaseState.ready || !data.id) return;
                    const { doc, setDoc } = window.FirebaseSDK;
                    const { db } = firebaseState;
                    await setDoc(doc(db, 'perfiles', String(data.id)), data);
                };

                const recalculateProfile = (profile) => {
                    const history = profile.history || [];
                    const snapshots = profile.snapshots || [];
                    const getEventTime = (ev) => ev.id ? parseInt(ev.id) : new Date(ev.date).getTime();
                    
                    const allEvents = [
                        ...history.map(h => ({ ...h, type: 'contribution', time: getEventTime(h) })),
                        ...snapshots.map(s => ({ ...s, type: 'snapshot', time: getEventTime(s) }))
                    ].sort((a, b) => a.time - b.time);

                    let currentBalance = 0;
                    let currentContributed = 0;

                    allEvents.forEach(ev => {
                        if (ev.type === 'contribution') {
                            currentContributed += ev.amount;
                            currentBalance += ev.amount;
                        } else if (ev.type === 'snapshot') {
                            currentBalance = ev.balance; 
                        }
                    });

                    return { ...profile, totalContributed: currentContributed, realBalance: currentBalance };
                };

                const handleAddSaving = async () => {
                    if (!newAmount || isNaN(newAmount) || !activeProfile.id) return;
                    const amount = parseFloat(newAmount);
                    const today = new Date().toLocaleDateString();
                    
                    const newHistory = [...(activeProfile.history || []), { id: Date.now().toString(), date: today, amount, note: newNote || 'Ahorro' }];
                    const updatedProfile = recalculateProfile({ ...activeProfile, history: newHistory });
                    
                    await saveToCloud(updatedProfile);
                    setNewAmount(''); setNewNote(''); setShowAddModal(false);
                };

                const handleAdminSync = async () => {
                    if (!adminRealBalance || isNaN(adminRealBalance) || !activeProfile.id) return;
                    const val = parseFloat(adminRealBalance);
                    
                    const newSnapshots = [...(activeProfile.snapshots || []), { id: Date.now().toString(), date: new Date().toLocaleDateString(), balance: val }];
                    const updatedProfile = recalculateProfile({ ...activeProfile, snapshots: newSnapshots });
                    
                    await saveToCloud(updatedProfile);
                    setAdminRealBalance(''); setShowAdminModal(false);
                };

                const deleteRecordItem = async (itemId, type) => {
                    if (!activeProfile.id) return;
                    let newHistory = activeProfile.history || [];
                    let newSnapshots = activeProfile.snapshots || [];
                    
                    if (type === 'Ahorro') {
                        newHistory = newHistory.filter(h => h.id !== itemId);
                    } else {
                        newSnapshots = newSnapshots.filter(s => s.id !== itemId);
                    }

                    const updatedProfile = recalculateProfile({ ...activeProfile, history: newHistory, snapshots: newSnapshots });
                    await saveToCloud(updatedProfile);
                };

                const handleSaveGoal = async () => {
                    if (!newGoalName || !newGoalTarget || !activeProfile.id) return;
                    let newGoals;
                    if (editingGoalId) {
                        newGoals = (activeProfile.goals || []).map(g => g.id === editingGoalId ? { ...g, name: newGoalName, target: parseFloat(newGoalTarget) } : g);
                    } else {
                        newGoals = [...(activeProfile.goals || []), { id: Date.now().toString(), name: newGoalName, target: parseFloat(newGoalTarget) }];
                    }
                    await saveToCloud({ ...activeProfile, goals: newGoals });
                    setNewGoalName(''); setNewGoalTarget(''); setEditingGoalId(null); setShowGoalModal(false);
                };

                const deleteGoal = async (goalId) => {
                    if (!activeProfile.id) return;
                    const newGoals = (activeProfile.goals || []).filter(g => g.id !== goalId);
                    await saveToCloud({ ...activeProfile, goals: newGoals });
                };

                const handleAddAchievement = async () => {
                    if (!newAchName || !newAchTarget || !activeProfile.id) return;
                    const currentAchievements = activeProfile.achievements || [];
                    const nextColor = achievementColors[currentAchievements.length % achievementColors.length];

                    const newAch = {
                        id: Date.now().toString(),
                        label: newAchName,
                        target: parseFloat(newAchTarget),
                        type: newAchType,
                        icon: newAchIcon,
                        color: nextColor
                    };
                    await saveToCloud({ ...activeProfile, achievements: [...currentAchievements, newAch] });
                    setNewAchName(''); setNewAchTarget('');
                };

                const deleteAchievement = async (achId) => {
                    if (!activeProfile.id) return;
                    const newAchievements = (activeProfile.achievements || []).filter(a => a.id !== achId);
                    await saveToCloud({ ...activeProfile, achievements: newAchievements });
                };

                const applySettings = async () => {
                    if (!activeProfile.id) return;
                    await saveToCloud({ ...activeProfile, theme: newTheme, emoji: newEmoji });
                    setShowSettingsModal(false);
                };

                const handleAddProfile = async () => {
                    if (!newName.trim()) return;
                    const id = Date.now().toString();
                    const defaultAchievements = [
                        { id: 'd1', label: 'Primer Ahorro', target: 1000, type: 'ahorro', icon: 'PiggyBank', color: 'from-yellow-400 to-orange-600' }
                    ];
                    const newProf = { id, name: newName, theme: newTheme, emoji: newEmoji, realBalance: 0, totalContributed: 0, history: [], snapshots: [], goals: [], achievements: defaultAchievements, config: { iceCreamPrice: 45, moviePrice: 120 } };
                    await saveToCloud(newProf);
                    setActiveProfileId(id);
                    setNewName(''); setShowProfileModal(false);
                };

                const combinedRecords = useMemo(() => {
                    if (!activeProfile.id) return [];
                    const history = activeProfile.history || [];
                    const snapshots = activeProfile.snapshots || [];
                    const getEventTime = (ev) => ev.id ? parseInt(ev.id) : new Date(ev.date).getTime();
                    
                    return [
                        ...history.map(h => ({ ...h, type: 'Ahorro', color: 'text-green-500', bg: 'bg-green-100', icon: 'Coins' })),
                        ...snapshots.map(s => ({ ...s, amount: s.balance, note: 'Sincronización Papá', type: 'Ajuste', color: 'text-indigo-500', bg: 'bg-indigo-100', icon: 'ShieldCheck' }))
                    ].sort((a, b) => getEventTime(b) - getEventTime(a)); 
                }, [activeProfile.history, activeProfile.snapshots]);

                const computedGrowthHistory = useMemo(() => {
                    if (!activeProfile.id) return [];
                    const getEventTime = (ev) => ev.id ? parseInt(ev.id) : new Date(ev.date).getTime();
                    const allEvents = [
                        ...(activeProfile.history || []).map(h => ({ ...h, type: 'contribution', time: getEventTime(h) })), 
                        ...(activeProfile.snapshots || []).map(s => ({ ...s, type: 'snapshot', time: getEventTime(s) }))
                    ].sort((a, b) => a.time - b.time);
                    
                    let timeline = []; let runCont = 0; let lastBal = 0;
                    allEvents.forEach(ev => {
                        if (ev.type === 'contribution') { runCont += ev.amount; lastBal += ev.amount; } else { lastBal = ev.balance; }
                        timeline.push({ date: ev.date, balance: lastBal, contributed: runCont });
                    });
                    return timeline;
                }, [activeProfile.history, activeProfile.snapshots]);

                const sourceData = useMemo(() => {
                    if (!activeProfile.history) return [];
                    const groups = activeProfile.history.reduce((acc, h) => { const label = h.note || 'Otros'; acc[label] = (acc[label] || 0) + h.amount; return acc; }, {});
                    return Object.entries(groups).map(([label, value]) => ({ label, value }));
                }, [activeProfile.history]);

                if (loading) return <div className="h-screen flex items-center justify-center bg-sky-50 flex-col gap-6 text-sky-600 font-black text-3xl animate-pulse"><SafeIcon name="Cloud" size={80} /> CONECTANDO A LA NUBE...</div>;

                const currentRealBalance = activeProfile.realBalance || 0;
                const totalRendimientos = Math.max(0, currentRealBalance - (activeProfile.totalContributed || 0));
                const percentageGain = (activeProfile.totalContributed || 0) > 0 ? (totalRendimientos / activeProfile.totalContributed) * 100 : 0;
                const iceCreamEquiv = Math.floor(totalRendimientos / (activeProfile.config?.iceCreamPrice || 45));
                const cinemaEquiv = Math.floor(totalRendimientos / (activeProfile.config?.moviePrice || 120));

                const currentAchievements = activeProfile.achievements || [];

                return (
                    <div className={`min-h-screen ${theme.light} p-4 md:p-8 transition-all`}>
                        <div className="max-w-7xl mx-auto fade-in">
                            {/* Toolbar de selección */}
                            <div className="flex flex-wrap items-center justify-between gap-4 mb-8 bg-white/70 backdrop-blur-md p-4 rounded-[2.5rem] border-4 border-white shadow-xl">
                                <div className="flex items-center gap-3">
                                    {profiles.map(p => (

                                <div className="flex gap-4 mb-10 bg-slate-100 p-3 rounded-[2.5rem] overflow-x-auto custom-scrollbar">

                                <button onClick={() => setShowAdminModal(false)} className="w-full mt-12 py-8 font-black bg-slate-100 text-slate-400 rounded-[3rem] text-2xl uppercase tracking-widest leading-none">Cerrar Panel</button>

                        )}

                        {showGoalModal && (
                            <div className="fixed inset-0 bg-indigo-900/80 backdrop-blur-xl flex items-center justify-center p-4 z-[100]"><div className="bg-white rounded-[4rem] p-12 max-w-md w-full shadow-2xl border-8 border-indigo-50 text-center uppercase"><h2 className="text-5xl font-black mb-10 text-indigo-600 tracking-tighter leading-none">{editingGoalId ? 'Editar Sueño' : 'Nuevo Sueño'}</h2><input type="text" value={newGoalName} onChange={(e) => setNewGoalName(e.target.value)} className="w-full p-8 bg-slate-50 border-4 border-slate-100 rounded-[2.5rem] outline-none font-black text-3xl text-center mb-4" placeholder="¿Qué sueñas?" /><input type="number" value={newGoalTarget} onChange={(e) => setNewGoalTarget(e.target.value)} className="w-full p-8 bg-slate-50 border-4 border-slate-100 rounded-[2.5rem] outline-none text-6xl font-black text-center" placeholder="$ Costo" /><div className="flex gap-4 mt-8"><button onClick={() => setShowGoalModal(false)} className="flex-1 py-6 font-black text-slate-400 text-xl tracking-widest leading-none text-center">Cerrar</button><button onClick={handleSaveGoal} className={`flex-2 py-6 px-10 font-black ${theme.bg} text-white rounded-[2rem] text-2xl uppercase leading-none btn-3d ${theme.shadow}`}>Guardar</button></div></div></div>
                        )}

                        {showProfileModal && (
                            <div className="fixed inset-0 bg-indigo-950/90 backdrop-blur-2xl flex items-center justify-center p-4 z-[100]"><div className="bg-white rounded-[4rem] p-12 max-w-md w-full shadow-2xl text-center border-[12px] border-slate-50 uppercase"><h2 className="text-5xl font-black mb-10 text-indigo-900 tracking-tighter leading-none">Unirse</h2><input type="text" value={newName} onChange={(e) => setNewName(e.target.value)} className="w-full p-10 bg-slate-50 border-4 border-slate-100 rounded-[3rem] outline-none font-black text-4xl text-center mb-10" placeholder="Nombre" /><div className="flex gap-2 justify-center flex-wrap mb-10 bg-slate-50 p-4 rounded-3xl max-h-40 overflow-y-auto">{availableEmojis.map(e => (<span key={e} onClick={() => setNewEmoji(e)} className={`text-4xl p-2 cursor-pointer rounded-xl hover:bg-white transition-all ${newEmoji === e ? 'bg-white shadow-md scale-110' : ''}`}>{e}</span>))}</div><div className="flex gap-6 justify-center mb-12">{Object.keys(colorThemes).map(c => (<button key={c} onClick={() => setNewTheme(c)} className={`w-20 h-20 rounded-[2rem] transition-all transform ${colorThemes[c].bg} ${newTheme === c ? 'ring-[12px] ring-indigo-100 scale-125 rotate-12 shadow-2xl' : 'opacity-40 scale-90'}`} />))}</div><div className="flex gap-4"><button onClick={() => setShowProfileModal(false)} className="flex-1 py-8 font-black text-slate-400 text-xl tracking-widest leading-none text-center">Volver</button><button onClick={handleAddProfile} className="flex-2 py-8 px-12 font-black bg-indigo-600 text-white rounded-[3rem] text-3xl shadow-[0_15px_0_0_#1e1b4b] active:top-2 active:shadow-none relative uppercase leading-none">¡Lista!</button></div></div></div>
                        )}
                    </div>
                );
            };

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        })();
    </script>
</body>
</html>
