<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetes Kids Familiar</title>
    
    <!-- CDNs: React, ReactDOM, Babel, Tailwind CSS, Lucide Icons y Firebase -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        // Asignamos a window para que Babel pueda acceder
        window.Firebase = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot, collection, updateDoc, deleteDoc };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
        body { font-family: 'Fredoka', sans-serif; background: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot, collection, updateDoc, deleteDoc } = window.Firebase;

        // --- Configuración Visual ---
        const AVAILABLE_EMOJIS = ['👧', '👦', '🦄', '🚀', '🎨', '🍦', '🎮', '⚽', '🐱', '🐶', '🐯', '🐼', '🦊', '🐨', '🦁', '🦖', '🧚', '🧞', '⭐', '🌈', '🍭', '🍕', '🎸', '🛹', '👾'];
        const COLOR_THEMES = {
            rose: { bg: 'bg-rose-500', text: 'text-rose-600', light: 'bg-rose-50', border: 'border-rose-200', gradient: 'from-pink-400 to-rose-600', chart: '#fb7185' },
            sky: { bg: 'bg-sky-500', text: 'text-sky-600', light: 'bg-sky-50', border: 'border-sky-200', gradient: 'from-sky-400 to-blue-600', chart: '#38bdf8' },
            emerald: { bg: 'bg-emerald-500', text: 'text-emerald-600', light: 'bg-emerald-50', border: 'border-emerald-200', gradient: 'from-emerald-400 to-teal-600', chart: '#34d399' },
            violet: { bg: 'bg-purple-500', text: 'text-purple-600', light: 'bg-purple-50', border: 'border-purple-200', gradient: 'from-purple-400 to-indigo-600', chart: '#a78bfa' },
            amber: { bg: 'bg-amber-500', text: 'text-amber-600', light: 'bg-amber-50', border: 'border-amber-200', gradient: 'from-amber-400 to-orange-600', chart: '#fbbf24' }
        };
        const ACHIEVEMENT_COLORS = ['from-yellow-400 to-orange-600', 'from-emerald-400 to-teal-600', 'from-purple-400 to-fuchsia-600', 'from-sky-400 to-indigo-600'];

        // Helper para iconos de Lucide en React Standalone
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = React.useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons({
                        attrs: { size, class: className },
                        nameAttr: 'data-lucide',
                        icons: { [name]: lucide.icons[name] }
                    });
                }
            }, [name, size, className]);
            return <i data-lucide={name} ref={iconRef} className={className}></i>;
        };

        const PieChartSources = ({ data }) => {
            if (!data || data.length === 0) return <div className="text-center py-8 text-slate-400 font-bold italic">¡Aún no hay ahorros registrados!</div>;
            const total = data.reduce((sum, item) => sum + (item.value || 0), 0);
            let cumulativePercent = 0;
            const colors = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40'];
            return (
                <div className="flex flex-col md:flex-row items-center justify-center gap-12">
                    <div className="relative w-48 h-48 drop-shadow-xl flex-shrink-0">
                        <svg viewBox="0 0 32 32" className="w-full h-full transform -rotate-90">
                            {data.map((item, i) => {
                                const percent = (item.value / total) * 100;
                                const strokeDasharray = `${percent} ${100 - percent}`;
                                const strokeDashoffset = -cumulativePercent;
                                cumulativePercent += percent;
                                return <circle key={i} cx="16" cy="16" r="16" fill="transparent" stroke={colors[i % colors.length]} strokeWidth="32" strokeDasharray={strokeDasharray} strokeDashoffset={strokeDashoffset} />;
                            })}
                            <circle cx="16" cy="16" r="11" fill="white" />
                        </svg>
                        <div className="absolute inset-0 flex items-center justify-center flex-col text-center uppercase">
                            <span className="text-[10px] font-black text-slate-400 leading-none">Total</span>
                            <span className="text-xl font-black text-slate-800">${total.toLocaleString()}</span>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 gap-2 w-full">
                        {data.map((item, i) => (
                            <div key={i} className="flex items-center justify-between bg-white p-3 rounded-xl border border-slate-100 shadow-sm">
                                <div className="flex items-center gap-2">
                                    <div className="w-3 h-3 rounded-full" style={{ backgroundColor: colors[i % colors.length] }}></div>
                                    <span className="font-bold text-slate-700 text-xs">{item.label}</span>
                                </div>
                                <span className="font-black text-slate-800 text-xs">${item.value.toLocaleString()}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const GrowthLineChart = ({ data, color }) => {
            if (!data || data.length < 2) return (
                <div className="h-full flex flex-col items-center justify-center text-slate-400 font-bold italic p-8 text-center bg-white rounded-3xl border-4 border-dashed border-slate-50">
                    <Icon name="mountain" size={48} className="mb-4 opacity-20" />
                    <p>Sincroniza el saldo real en el Panel Papá para ver tu montaña.</p>
                </div>
            );
            const width = 800; const height = 250; const padding = 60;
            const maxVal = Math.max(...data.map(d => d.balance || 0)) * 1.2;
            const points = data.map((d, i) => ({
                x: padding + (i * (width - 2 * padding)) / (data.length - 1),
                y: height - padding - ((d.balance || 0) * (height - 2 * padding)) / (maxVal || 1)
            }));
            const pathData = `M ${points[0].x} ${points[0].y} ` + points.slice(1).map(p => `L ${p.x} ${p.y}`).join(' ');
            return (
                <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full overflow-visible drop-shadow-xl">
                    <path d={pathData} fill="none" stroke={color} strokeWidth="10" strokeLinecap="round" strokeLinejoin="round" />
                    {points.map((p, i) => <circle key={i} cx={p.x} cy={p.y} r={10} fill="white" stroke={color} strokeWidth="6" />)}
                </svg>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [profiles, setProfiles] = useState([]);
            const [activeProfileId, setActiveProfileId] = useState(null);
            const [loading, setLoading] = useState(true);
            const [showAddModal, setShowAddModal] = useState(false);
            const [showAdminModal, setShowAdminModal] = useState(false);
            const [showSettingsModal, setShowSettingsModal] = useState(false);
            const [showGoalModal, setShowGoalModal] = useState(false);
            const [adminTab, setAdminTab] = useState('balance');
            const [newAmount, setNewAmount] = useState('');
            const [newNote, setNewNote] = useState('');
            const [adminRealBalance, setAdminRealBalance] = useState('');
            const [newTheme, setNewTheme] = useState('rose');
            const [newEmoji, setNewEmoji] = useState('👧');
            const [newGoalName, setNewGoalName] = useState('');
            const [newGoalTarget, setNewGoalTarget] = useState('');
            const [newAchName, setNewAchName] = useState('');
            const [newAchTarget, setNewAchTarget] = useState('');
            const [newAchType, setNewAchType] = useState('ahorro');

            // --- CONFIGURACIÓN FIREBASE ---
            // IMPORTANTE: Sustituye esto por tu configuración real si no usas variables de entorno
            const fbConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : {
                apiKey: "", authDomain: "", projectId: "", storageBucket: "", messagingSenderId: "", appId: ""
            };
            const currentAppId = window.__app_id || 'cetes-kids-v3-final';

            useEffect(() => {
                const app = initializeApp(fbConfig);
                const auth = getAuth(app);
                const initAuth = async () => { await signInAnonymously(auth); };
                initAuth();
                return onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                const db = getFirestore();
                const profilesRef = collection(db, 'artifacts', currentAppId, 'public', 'data', 'profiles');
                return onSnapshot(profilesRef, (snapshot) => {
                    const loaded = snapshot.docs.map(d => ({ ...d.data(), id: d.id }));
                    if (loaded.length === 0) {
                        const initial = [
                            { id: 'majo', name: 'Majo', theme: 'rose', emoji: '🎨', realBalance: 0, totalContributed: 0, history: [], snapshots: [], goals: [], achievements: [{id:'1', label:'Primer Ahorro', target:500, type:'ahorro', color:'from-yellow-400 to-orange-600'}], config: { iceCreamPrice: 45, moviePrice: 120 } },
                            { id: 'ivanna', name: 'Ivanna', theme: 'sky', emoji: '🦄', realBalance: 0, totalContributed: 0, history: [], snapshots: [], goals: [], achievements: [{id:'1', label:'Primer Ahorro', target:500, type:'ahorro', color:'from-yellow-400 to-orange-600'}], config: { iceCreamPrice: 45, moviePrice: 120 } }
                        ];
                        initial.forEach(p => setDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'profiles', p.id), p));
                    } else {
                        setProfiles(loaded);
                        setActiveProfileId(prev => prev || loaded[0].id);
                    }
                    setLoading(false);
                });
            }, [user]);

            const activeProfile = profiles.find(p => p.id === activeProfileId) || profiles[0] || {};
            const theme = COLOR_THEMES[activeProfile.theme] || COLOR_THEMES.rose;
            const currentBalance = activeProfile.realBalance || 0;
            const contributed = activeProfile.totalContributed || 0;
            const gain = Math.max(0, currentBalance - contributed);
            const iceCreamCount = Math.floor(gain / (activeProfile.config?.iceCreamPrice || 45));
            const movieCount = Math.floor(gain / (activeProfile.config?.moviePrice || 120));

            const sourceData = useMemo(() => {
                if (!activeProfile.history) return [];
                const groups = activeProfile.history.reduce((acc, h) => {
                    const label = h.note || 'Otros';
                    acc[label] = (acc[label] || 0) + (h.amount || 0);
                    return acc;
                }, {});
                return Object.entries(groups).map(([label, value]) => ({ label, value }));
            }, [activeProfile.history]);

            const combinedRecords = useMemo(() => {
                if (!activeProfile.id) return [];
                const hists = (activeProfile.history || []).map(h => ({ ...h, type: 'Ahorro', color: 'text-emerald-500', bg: 'bg-emerald-100', iconName: 'coins' }));
                const snaps = (activeProfile.snapshots || []).map(s => ({ ...s, amount: s.balance, note: 'Sincronización Real', type: 'Ajuste', color: 'text-indigo-500', bg: 'bg-indigo-100', iconName: 'shield-check' }));
                return [...hists, ...snaps].sort((a, b) => (b.time || 0) - (a.time || 0));
            }, [activeProfile.history, activeProfile.snapshots]);

            const recalculateAndSave = async (p) => {
                const db = getFirestore();
                const events = [...(p.history || []).map(h => ({...h, type:'c', t: h.time})), ...(p.snapshots || []).map(s => ({...s, type:'s', t: s.time}))].sort((a,b) => a.t - b.t);
                let bal = 0, totalC = 0;
                events.forEach(ev => { if(ev.type === 'c') { totalC += ev.amount; bal += ev.amount; } else { bal = ev.balance; } });
                await setDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'profiles', p.id), { ...p, realBalance: bal, totalContributed: totalC });
            };

            const handleAddSaving = async () => {
                const amt = parseFloat(newAmount); if (isNaN(amt) || amt <= 0) return;
                const updated = { ...activeProfile, history: [...(activeProfile.history || []), { id: Date.now().toString(), time: Date.now(), date: new Date().toLocaleDateString(), amount: amt, note: newNote || 'Ahorro' }] };
                await recalculateAndSave(updated); setNewAmount(''); setNewNote(''); setShowAddModal(false);
            };

            const handleAdminSync = async () => {
                const val = parseFloat(adminRealBalance); if (isNaN(val)) return;
                const updated = { ...activeProfile, snapshots: [...(activeProfile.snapshots || []), { id: Date.now().toString(), time: Date.now(), date: new Date().toLocaleDateString(), balance: val }] };
                await recalculateAndSave(updated); setAdminRealBalance(''); setShowAdminModal(false);
            };

            if (loading) return <div className="h-screen flex items-center justify-center font-black text-indigo-600 text-2xl animate-pulse uppercase">Cargando Cetes Kids...</div>;

            return (
                <div className={`min-h-screen ${theme.light} pb-20`}>
                    <nav className="fixed top-0 inset-x-0 bg-white/80 backdrop-blur-md z-50 p-4 border-b border-slate-200">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex gap-2">
                                {profiles.map(p => (
                                    <button key={p.id} onClick={() => setActiveProfileId(p.id)} className={`px-5 py-2.5 rounded-2xl font-black text-sm transition-all ${activeProfileId === p.id ? `${COLOR_THEMES[p.theme].bg} text-white shadow-lg` : 'bg-slate-100 text-slate-400'}`}>
                                        {p.emoji} {p.name}
                                    </button>
                                ))}
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => { setNewTheme(activeProfile.theme); setNewEmoji(activeProfile.emoji); setShowSettingsModal(true); }} className={`p-2.5 rounded-xl text-white shadow-md ${theme.bg}`}><Icon name="palette" size={20}/></button>
                                <button onClick={() => { setAdminRealBalance(currentBalance); setShowAdminModal(true); }} className="p-2.5 bg-slate-900 text-white rounded-xl shadow-md"><Icon name="shield-check" size={20}/></button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-5xl mx-auto pt-24 px-4 space-y-8">
                        <header className={`bg-gradient-to-br ${theme.gradient} rounded-[3rem] p-10 md:p-16 text-white shadow-2xl relative overflow-hidden`}>
                            <div className="relative z-10 flex flex-col md:flex-row justify-between items-center gap-10">
                                <div className="flex flex-col md:flex-row items-center gap-8 text-center md:text-left">
                                    <div className="bg-white/20 p-8 rounded-[2.5rem] text-8xl shadow-2xl backdrop-blur-sm border border-white/30">{activeProfile.emoji}</div>
                                    <div>
                                        <h1 className="text-5xl md:text-7xl font-black mb-2 tracking-tighter leading-none italic">¡Hola, {activeProfile.name}!</h1>
                                        <p className="text-white/80 text-xl font-bold uppercase tracking-[0.2em]">Tu tesoro crece cada día</p>
                                    </div>
                                </div>
                                <button onClick={() => setShowAddModal(true)} className="group bg-white text-slate-900 px-10 py-6 rounded-3xl font-black text-2xl shadow-xl flex items-center gap-4 uppercase tracking-tighter">
                                    <Icon name="plus-circle" size={36} className={theme.text} /> ¡Sumar!
                                </button>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div className="bg-white rounded-[2.5rem] p-10 text-center shadow-xl border-4 border-slate-50">
                                <span className="text-slate-400 font-black uppercase text-xs tracking-widest block mb-4 italic">Saldo en CetesDirecto</span>
                                <div className="text-7xl font-black text-slate-800 tracking-tighter leading-none mb-4">${currentBalance.toLocaleString()}</div>
                                <div className="bg-slate-50 px-5 py-2 rounded-full font-bold text-slate-400 text-sm italic">Base: ${contributed.toLocaleString()}</div>
                            </div>
                            <div className="bg-emerald-500 rounded-[2.5rem] p-10 text-center text-white shadow-xl shadow-emerald-100">
                                <span className="opacity-70 font-black uppercase text-xs tracking-widest block mb-4 italic">Ganancia Mágica ✨</span>
                                <div className="text-7xl font-black tracking-tighter leading-none mb-4 animate-pulse">+${gain.toLocaleString()}</div>
                                <div className="bg-white/20 backdrop-blur-md px-6 py-2 rounded-full w-fit mx-auto font-black italic">¡Tu dinero trabaja para ti!</div>
                            </div>
                        </div>

                        <section className="bg-indigo-900 rounded-[3rem] p-10 text-white shadow-2xl">
                            <div className="flex items-center gap-4 mb-10">
                                <Icon name="party-popper" size={32} className="text-indigo-400" />
                                <h2 className="text-3xl font-black italic uppercase tracking-tighter">¡Premios Ganados!</h2>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className={`p-8 rounded-[2rem] flex items-center gap-8 border-2 ${iceCreamCount > 0 ? 'bg-white/10 border-rose-400' : 'bg-white/5 opacity-40'}`}>
                                    <div className="bg-rose-500 p-6 rounded-2xl shadow-lg"><Icon name="ice-cream" size={48} /></div>
                                    <div className="text-left">
                                        <div className="text-6xl font-black leading-none">{iceCreamCount}</div>
                                        <div className="text-sm font-black uppercase tracking-widest opacity-60">Helados Ganados</div>
                                    </div>
                                </div>
                                <div className={`p-8 rounded-[2rem] flex items-center gap-8 border-2 ${movieCount > 0 ? 'bg-white/10 border-sky-400' : 'bg-white/5 opacity-40'}`}>
                                    <div className="bg-sky-500 p-6 rounded-2xl shadow-lg"><Icon name="ticket" size={48} /></div>
                                    <div className="text-left">
                                        <div className="text-6xl font-black leading-none">{movieCount}</div>
                                        <div className="text-sm font-black uppercase tracking-widest opacity-60">Boletos de Cine</div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            <div className="bg-white rounded-[2.5rem] p-10 shadow-xl border border-slate-50">
                                <h3 className="text-2xl font-black uppercase italic text-slate-800 mb-8 flex items-center gap-3"><Icon name="pie-chart" className="text-amber-500" /> ¿De dónde viene?</h3>
                                <PieChartSources data={sourceData} />
                            </div>
                            <div className="bg-white rounded-[2.5rem] p-10 shadow-xl border border-slate-50">
                                <h3 className="text-2xl font-black uppercase italic text-slate-800 mb-8 flex items-center gap-3"><Icon name="mountain" className={theme.text} /> Tu Montaña</h3>
                                <div className="h-[250px]"><GrowthLineChart data={activeProfile.snapshots || []} color={theme.chart} /></div>
                            </div>
                        </div>

                        <section className="bg-white rounded-[3rem] p-10 shadow-xl border-t-8 border-amber-400">
                            <div className="flex items-center gap-4 mb-10"><Icon name="award" className="text-amber-500" size={48} /><h2 className="text-4xl font-black italic uppercase tracking-tighter text-slate-800">Mis Medallas</h2></div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {(activeProfile.achievements || []).map((medal) => {
                                    const val = medal.type === 'ahorro' ? contributed : gain; const unlocked = val >= medal.target; const prog = Math.min(100, (val / medal.target) * 100);
                                    return (
                                        <div key={medal.id} className={`relative p-6 rounded-[2rem] border-4 flex items-center gap-6 transition-all ${unlocked ? 'bg-yellow-50 border-yellow-200 shadow-lg' : 'bg-slate-50 border-slate-100 opacity-60'}`}>
                                            <div className={`p-6 rounded-2xl flex-shrink-0 ${unlocked ? `bg-gradient-to-br ${medal.color} text-white shadow-xl rotate-3` : 'bg-slate-200 text-slate-400'}`}><Icon name="piggy-bank" size={40} /></div>
                                            <div className="flex-1">
                                                <h4 className={`text-xl font-black uppercase tracking-tight ${unlocked ? 'text-slate-800' : 'text-slate-400'}`}>{medal.label}</h4>
                                                <div className="w-full bg-slate-200 h-3 rounded-full mt-3 overflow-hidden"><div className={`h-full ${unlocked ? 'bg-yellow-400' : 'bg-slate-400'} transition-all duration-1000`} style={{ width: `${prog}%` }}></div></div>
                                                <p className={`text-xs font-bold mt-2 uppercase tracking-widest ${unlocked ? 'text-yellow-600' : 'text-slate-400'}`}>{unlocked ? '¡LO LOGRASTE! 🏆' : `Meta: $${medal.target.toLocaleString()}`}</p>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </section>

                        <section className="space-y-8">
                            <div className="flex items-center justify-between px-2"><h2 className="text-4xl font-black italic uppercase tracking-tighter text-slate-800 flex items-center gap-4"><Icon name="heart" className="text-red-500" /> Mis Sueños</h2><button onClick={() => setShowGoalModal(true)} className="p-3 bg-white text-indigo-600 rounded-full shadow-md border border-indigo-50"><Icon name="plus-circle" size={28}/></button></div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                {(activeProfile.goals || []).map(g => {
                                    const prog = Math.min(100, (currentBalance / g.target) * 100);
                                    return (
                                        <div key={g.id} className={`bg-white p-8 rounded-[2.5rem] border-4 shadow-xl relative group ${prog >= 100 ? 'border-emerald-400 bg-emerald-50' : 'border-white'}`}>
                                            <button onClick={async () => { const db = getFirestore(); const upd = { ...activeProfile, goals: activeProfile.goals.filter(goal => goal.id !== g.id) }; await setDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'profiles', activeProfileId), upd); }} className="absolute top-4 right-4 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100"><Icon name="x" size={20}/></button>
                                            <div className="flex items-center gap-4 mb-6"><div className={`p-4 rounded-2xl ${prog >= 100 ? 'bg-emerald-500 text-white' : 'bg-slate-100 text-slate-400'}`}><Icon name="gift" size={28}/></div><h3 className="font-black text-2xl text-slate-800 italic">{g.name}</h3></div>
                                            <div className="w-full bg-slate-100 h-8 rounded-full overflow-hidden border-2 border-slate-50"><div className={`h-full transition-all duration-1000 ${prog >= 100 ? 'bg-emerald-500' : theme.bg}`} style={{ width: `${prog}%` }}></div></div>
                                            <div className="flex justify-between mt-4 font-black text-sm uppercase italic tracking-widest text-slate-400"><span>${currentBalance.toLocaleString()}</span><span className={theme.text}>Meta: ${g.target.toLocaleString()}</span></div>
                                            {prog >= 100 && <div className="mt-4 text-center text-emerald-600 font-black animate-bounce uppercase">¡Sueño Cumplido! 🚀</div>}
                                        </div>
                                    );
                                })}
                            </div>
                        </section>
                    </main>

                    {/* --- MODALES (Implementados con Tailwind) --- */}
                    {showAddModal && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-xl z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[3rem] p-10 max-w-md w-full shadow-2xl border-b-[12px] border-indigo-100">
                                <div className="text-center mb-8"><Icon name="piggy-bank" size={64} className="mx-auto text-indigo-500 mb-4" /><h2 className="text-4xl font-black italic text-slate-800 uppercase">Sumar al Tesoro</h2></div>
                                <div className="space-y-6">
                                    <input type="number" value={newAmount} onChange={e => setNewAmount(e.target.value)} className="w-full p-6 bg-slate-50 border-4 border-slate-100 rounded-3xl outline-none text-5xl font-black text-center focus:border-indigo-500" placeholder="0" autoFocus />
                                    <input type="text" value={newNote} onChange={e => setNewNote(e.target.value)} className="w-full p-5 bg-slate-50 border-4 border-slate-100 rounded-2xl outline-none font-bold text-center" placeholder="¿Por qué lo ahorraste?" />
                                    <div className="flex gap-4"><button onClick={() => setShowAddModal(false)} className="flex-1 font-black text-slate-400 uppercase tracking-widest text-xs">CANCELAR</button><button onClick={handleAddSaving} className={`flex-[2] py-5 font-black text-white rounded-full text-xl shadow-xl ${theme.bg}`}>¡LISTO!</button></div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showAdminModal && (
                        <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-2xl z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[3rem] p-10 max-w-4xl w-full shadow-2xl border-4 border-slate-200 h-[80vh] flex flex-col">
                                <div className="flex justify-between items-center mb-8 pb-6 border-b border-slate-100"><h2 className="text-3xl font-black italic uppercase tracking-tighter text-slate-800">Panel Papá</h2><button onClick={() => setShowAdminModal(false)} className="text-slate-400 hover:text-slate-900"><Icon name="x" size={32}/></button></div>
                                <div className="flex gap-2 mb-8 bg-slate-100 p-2 rounded-2xl overflow-x-auto no-scrollbar">{[{id: 'balance', label: 'Sincronizar'}, {id: 'history', label: 'Registros'}, {id: 'achievements', label: 'Medallas'}, {id: 'config', label: 'Precios'}].map(tab => (<button key={tab.id} onClick={() => setAdminTab(tab.id)} className={`flex-1 py-4 px-6 font-black rounded-xl text-xs uppercase tracking-widest transition-all whitespace-nowrap ${adminTab === tab.id ? 'bg-white shadow-md text-indigo-600' : 'text-slate-400'}`}>{tab.label}</button>))}</div>
                                <div className="flex-1 overflow-y-auto pr-4 no-scrollbar">
                                    {adminTab === 'balance' && (<div className="space-y-8 py-4"><div className="bg-indigo-50 p-10 rounded-[2.5rem] border-2 border-indigo-100 text-center"><label className="text-[10px] font-black uppercase text-indigo-400 block mb-6 tracking-widest">Saldo Real en CetesDirecto ($)</label><input type="number" value={adminRealBalance} onChange={e => setAdminRealBalance(e.target.value)} className="w-full p-8 bg-white border-4 border-indigo-200 rounded-[2rem] outline-none text-7xl font-black text-center focus:border-indigo-500" placeholder="0.00" /></div><button onClick={handleAdminSync} className="w-full py-8 bg-indigo-600 text-white rounded-[2rem] text-2xl font-black shadow-xl uppercase tracking-widest">ACTUALIZAR NUBE FAMILIAR</button></div>)}
                                    {adminTab === 'history' && (<div className="space-y-4 py-4">{combinedRecords.map(r => (<div key={r.id} className="flex items-center justify-between p-5 bg-slate-50 rounded-2xl border border-slate-100 hover:bg-white hover:shadow-md transition-all group"><div className="flex items-center gap-4 text-left"><div className={`p-3 rounded-xl ${r.bg} ${r.color}`}><Icon name={r.iconName} size={24} /></div><div><p className="font-black text-lg text-slate-800 leading-none">{r.note}</p><p className="text-[10px] font-black text-slate-400 mt-1 uppercase tracking-widest">{r.date} • {r.type}</p></div></div><div className="flex items-center gap-6"><span className={`font-black text-xl ${r.color}`}>${r.amount.toLocaleString()}</span><button onClick={async () => { const db = getFirestore(); let h = activeProfile.history || []; let s = activeProfile.snapshots || []; if(r.type === 'Ahorro') h = h.filter(x => x.id !== r.id); else s = s.filter(x => x.id !== r.id); await recalculateAndSave({ ...activeProfile, history: h, snapshots: s }); }} className="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100"><Icon name="trash-2" size={20}/></button></div></div>))}</div>)}
                                    {adminTab === 'achievements' && (<div className="space-y-6 py-4"><div className="bg-slate-50 p-6 rounded-3xl border-2 border-slate-100"><h4 className="font-black text-slate-800 mb-6 uppercase text-sm italic text-center">Nueva Medalla</h4><div className="grid grid-cols-2 gap-4 mb-4"><input type="text" placeholder="Nombre" value={newAchName} onChange={e => setNewAchName(e.target.value)} className="p-4 rounded-xl border-2 border-slate-200 outline-none font-bold" /><input type="number" placeholder="Meta ($)" value={newAchTarget} onChange={e => setNewAchTarget(e.target.value)} className="p-4 rounded-xl border-2 border-slate-200 outline-none font-bold" /></div><div className="flex gap-4"><select value={newAchType} onChange={e => setNewAchType(e.target.value)} className="flex-1 p-4 rounded-xl border-2 border-slate-200 outline-none font-bold text-slate-500"><option value="ahorro">Ahorro Propio</option><option value="ganancia">Ganancia Mágica</option></select><button onClick={handleAddAchievement} className="px-8 py-4 bg-indigo-600 text-white font-black rounded-xl hover:bg-indigo-700">Crear</button></div></div></div>)}
                                    {adminTab === 'config' && (<div className="space-y-6 py-4"><div className="bg-rose-50 p-8 rounded-[2rem] border-2 border-rose-100 flex items-center justify-between"><div className="flex items-center gap-4"><Icon name="ice-cream" size={40} className="text-rose-500"/><span className="font-black text-rose-800 uppercase italic">Precio Helado ($)</span></div><input type="number" defaultValue={activeProfile.config?.iceCreamPrice} onBlur={(e) => { const db = getFirestore(); updateDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'profiles', activeProfileId), { 'config.iceCreamPrice': parseFloat(e.target.value) }) }} className="w-32 p-4 rounded-2xl border-2 border-rose-200 text-center font-black text-3xl" /></div></div>)}
                                </div>
                            </div>
                        </div>
                    )}

                    {showSettingsModal && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-xl z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[3rem] p-10 max-w-md w-full shadow-2xl border-4 border-slate-50 text-center">
                                <h2 className="text-3xl font-black mb-10 text-slate-800 italic uppercase tracking-tighter">Mi Estilo</h2>
                                <div className="mb-10"><label className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-6 block">Color de mi Nube</label><div className="flex gap-4 justify-center flex-wrap">{Object.keys(COLOR_THEMES).map(c => (<button key={c} onClick={() => setNewTheme(c)} className={`w-12 h-12 rounded-full transition-all transform hover:scale-110 ${COLOR_THEMES[c].bg} ${newTheme === c ? 'ring-[6px] ring-slate-100 scale-125 shadow-xl' : 'opacity-40'}`}/>))}</div></div>
                                <div className="flex gap-4 pt-6"><button onClick={() => setShowSettingsModal(false)} className="flex-1 font-black text-slate-400 uppercase tracking-widest text-xs">CERRAR</button><button onClick={async () => { const db = getFirestore(); await updateDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'profiles', activeProfile.id), { theme: newTheme, emoji: newEmoji }); setShowSettingsModal(false); }} className={`flex-[2] py-5 font-black bg-indigo-600 text-white rounded-full text-xl shadow-xl hover:bg-indigo-700 transition-all uppercase tracking-widest`}>GUARDAR</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
